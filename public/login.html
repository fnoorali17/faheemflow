<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff">
<title>FaheemFlow — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#3b6fd4;--font:'Nunito',sans-serif;--fd:'Lora',serif;--border:#e2dfd8;--bg:#f7f6f3;--text:#2d2c2a;--t2:#6b6860;--t3:#a8a59e;--danger:#dc2626}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
.wrap{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border:2px solid var(--border);border-radius:16px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 4px 32px rgba(0,0,0,0.06)}
.logo{font-family:var(--fd);font-size:26px;font-weight:500;text-align:center;margin-bottom:6px;color:var(--text)}
.logo em{color:var(--accent);font-style:normal}
.tagline{text-align:center;font-size:13px;color:var(--t3);margin-bottom:32px}
label{display:block;font-size:13px;font-weight:600;color:var(--t2);margin-bottom:6px}
input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 13px;font-family:var(--font);font-size:14px;color:var(--text);background:var(--bg);outline:none;margin-bottom:16px;transition:border-color .15s}
input:focus{border-color:var(--accent);background:#fff}
.btn{width:100%;background:var(--accent);color:#fff;border:none;padding:12px;border-radius:8px;font-size:15px;font-family:var(--font);font-weight:600;cursor:pointer;transition:opacity .1s;margin-top:4px}
.btn:hover{opacity:.88}
.btn:disabled{opacity:.5;cursor:default}
.err{background:#fef2f2;border:1.5px solid #fca5a5;color:var(--danger);border-radius:8px;padding:10px 13px;font-size:13px;margin-bottom:16px;display:none}
.err.show{display:block}
.footer{text-align:center;font-size:11px;color:var(--t3);margin-top:24px}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="logo">Faheem<em>Flow</em></div>
    <div class="tagline">Your personal productivity workspace</div>
    <div class="err" id="err"></div>
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="you@email.com" autocomplete="email"/>
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()"/>
    <button class="btn" id="btn" onclick="login()">Sign in</button>
    <div class="footer">FaheemFlow · Private access only</div>
  </div>
</div>
<script>
async function login(){
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  const btn=document.getElementById('btn'),err=document.getElementById('err');
  if(!email||!password){showErr('Please enter your email and password.');return;}
  btn.disabled=true;btn.textContent='Signing in…';err.classList.remove('show');
  try{
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const d=await r.json();
    if(r.ok){window.location.href='/';}
    else{showErr(d.error||'Login failed. Please try again.');btn.disabled=false;btn.textContent='Sign in';}
  }catch(e){showErr('Connection error. Please try again.');btn.disabled=false;btn.textContent='Sign in';}
}
function showErr(m){const e=document.getElementById('err');e.textContent=m;e.classList.add('show');}
document.getElementById('email').focus();
</script>
</body>
</html>
